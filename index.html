<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Quiz Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="quiz-container">
        <!-- Start Menu -->
        <div id="start-box" class="start-box">
            <h1 class="quiz-title">Quiz Game 🔥 </h1>
            <label for="category">Choose Category:</label>
            <select id="category">
                <option value="9">General Knowledge</option>
                <option value="18">Science</option>
                <option value="21">Sports</option>
                <option value="23">History</option>
            </select>
            <button onclick="startQuiz()" class="start-btn">Start Quiz</button>
        </div>

        <!-- Quiz Box -->
        <div id="quiz-box" class="quiz-box hidden">
            <p id="question" class="question"></p>
            <div id="options" class="options"></div>
            <p id="timer">Time Left: <span id="time">15</span>s</p>
            <button id="next-btn" class="next-btn">Next Question</button>
        </div>

        <!-- Score Box -->
        <div id="score-box" class="score-box hidden">
            <h2>Your Score: <span id="score"></span></h2>
            <h3>High Score: <span id="high-score">0</span></h3>
            <button onclick="restartQuiz()" class="restart-btn">Restart Quiz</button>
        </div>
    
 <!-- Footer -->
    <footer class="footer">
        Crafted with ❤️ by <span class="author">Soumyadeep Basu</span>
    </footer>

    <script src="script.js"></script>
</body>
</html>
